name: ci-wasm-tests

# bump 1
on:
  workflow_dispatch:

  push:

# Use concurrency to ensure that only one instance of this workflow is running at a time
concurrency:
  group: ci-wasm-tests-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  CROOT_DIR: /home/runner/work/build
  ARTIFACTS_DIR: /home/runner/work/artifacts
  PKG_DIR: linux-64

jobs:

  build_test:
    name: ada-cpp-test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      # Install OpenGL dependencies
      - name: Install OpenGL dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.68.0
          # The wasm tasks live in the `wasm` feature. This said `conda`, so pixi solved and
          # installed the wasm env at run time on every run, uncached.
          environments: wasm
          cache: true

      - name: Use prebuilt OCCT-wasm base (if available)
        # Point cmake at the reusable OCCT base via WASM_OCCT_PREBUILT_DIR so the wasm-pyodide
        # configure skips the ~30-min OCCT compile.
        # Falls back to building OCCT from source when the base isn't published.
        run: |
          echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
          repo=$(printf '%s' "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          base="ghcr.io/${repo}-occt-wasm-base:latest"
          if docker pull "$base" >/dev/null 2>&1; then
            dir="$RUNNER_TEMP/occt-wasm"
            mkdir -p "$dir"
            cid=$(docker create "$base")
            docker cp "$cid:/opt/occt-wasm/." "$dir/"
            docker rm "$cid" >/dev/null
            echo "WASM_OCCT_PREBUILT_DIR=$dir" >> "$GITHUB_ENV"
            echo "Using prebuilt OCCT-wasm base: $base"
          else
            echo "No prebuilt OCCT-wasm base ($base) — building OCCT from source."
          fi

      # This job used to run `pixi run wbuild` and nothing else. That sets BUILD_PYTHON=OFF and lands
      # on the legacy stub arm of cmake/wasm_build.cmake, so it cross-compiled OCCT for ~30 minutes
      # and then built src/wasm_utils.cpp — a single `double multiply(a, b)`. It never compiled
      # _ada_cpp_ext_impl, so it could not catch a wasm bug in the extension even in principle. It is
      # how an unguarded `glb_diff = _cad.glb_diff` shipped and broke `import adacpp` under pyodide,
      # and how the wheel came to declare no numpy dependency.
      #
      # Build the artifact the browser actually loads, and import it.
      - name: install the pyodide cross-build env
        run: pixi run -e wasm xbuildenv-install

      # Builds the ext for pyodide, packs the wheel, installs the node pyodide runtime, then
      # installs the wheel under node-pyodide and asserts against it (tools/test_wheel_pyodide.js).
      - name: build + test the pyodide wheel
        run: pixi run -e wasm test-wheel-pyodide

      # The OCC-free embind module the browser uses for STEP->GLB. Cheap (~1-2 min, no OCCT) and it
      # runs a real conversion, so there is no reason it was never wired up.
      - name: build + smoke-test the STEP->GLB embind module
        run: pixi run -e wasm test-stepglb-wasm