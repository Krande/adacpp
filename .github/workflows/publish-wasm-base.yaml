name: Publish wasm base image

# On a version tag, cross-compile the pyodide wasm wheel (OCCT→wasm via
# emscripten) and publish it as a ghcr base image:
#
#   ghcr.io/<owner>/adacpp-wasm-base:1.2.3  (+ :1.2, :latest, :sha-<short>)
#
# The image carries the wheel + manifest under /out/, so downstream image
# builds (e.g. adapy's viewer) can `COPY --from=ghcr.io/.../adacpp-wasm-base`
# instead of recompiling OCCT→wasm. Auth is the built-in GITHUB_TOKEN — no
# external secrets. We only publish on tag.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: publish-wasm-base-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # attach the wasm modules to the GitHub release on tag pushes
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v7

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.68.0
          environments: wasm
          cache: true

      - name: Install pyodide cross-build env
        run: pixi run -e wasm xbuildenv-install

      - name: Use prebuilt OCCT-wasm base (if available)
        # Pull the reusable OCCT base and point cmake at it via
        # WASM_OCCT_PREBUILT_DIR so wbuild-pyodide skips the ~30-min OCCT
        # compile. Falls back to building OCCT from source when the base
        # image isn't published yet (first run / missing access).
        run: |
          echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
          repo=$(printf '%s' "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          base="ghcr.io/${repo}-occt-wasm-base:latest"
          if docker pull "$base" >/dev/null 2>&1; then
            dir="$RUNNER_TEMP/occt-wasm"
            mkdir -p "$dir"
            cid=$(docker create "$base")
            docker cp "$cid:/opt/occt-wasm/." "$dir/"
            docker rm "$cid" >/dev/null
            echo "WASM_OCCT_PREBUILT_DIR=$dir" >> "$GITHUB_ENV"
            echo "Using prebuilt OCCT-wasm base: $base"
          else
            echo "No prebuilt OCCT-wasm base ($base) — building OCCT from source."
          fi

      - name: Cross-compile the pyodide wheel
        # depends-on chain: wbuild-pyodide → install → tools/build_wheel.py →
        # dist/ada_cpp-*.whl. With WASM_OCCT_PREBUILT_DIR set the OCCT compile is
        # skipped (links the prebuilt base); otherwise OCCT builds inline (~30 min).
        run: pixi run -e wasm pack-wheel-pyodide

      - name: Build the no-pyodide STEP->GLB wasm module
        # Standalone embind module (no OCCT, no pyodide) for the viewer's in-browser STEP->GLB.
        # OCC-free -> a quick emcc build, independent of the OCCT cross-compile above.
        run: pixi run -e wasm wbuild-stepglb

      - name: Build the in-browser GLB-diff wasm module
        # Standalone embind module (no OCCT, no pyodide, no tinygltf) for the viewer's in-browser
        # diff utility. OCC-free -> a quick emcc build.
        run: pixi run -e wasm wbuild-glbdiff

      - name: Build the no-pyodide IFC->GLB wasm module
        # Standalone embind module (no OCCT, no pyodide, no ifcopenshell) for the viewer's in-browser
        # IFC->GLB (IfcResolver -> libtess2 -> GLB). OCC-free -> a quick emcc build.
        run: pixi run -e wasm wbuild-ifcglb

      - name: Build the no-pyodide B-rep writer wasm module
        # Standalone embind module (no OCCT, no pyodide, no ifcopenshell) for the viewer's in-browser
        # STEP<->IFC writers (no tessellation). OCC-free -> a quick emcc build.
        run: pixi run -e wasm wbuild-brepwriter

      # Gate the publish on the artifacts actually working. Every step above only COMPILES; this job
      # went straight from "it linked" to pushing to ghcr, where the viewer consumes it. That is how
      # a wheel whose `import adacpp` raised under pyodide became the published artifact — and, later,
      # one declaring no numpy dependency, which killed the interpreter on any mesh access. Both are
      # caught just by importing the wheel, which costs seconds here.
      - name: Smoke-test the artifacts before publishing
        run: |
          pixi run -e wasm tools-install
          pixi run -e wasm node tools/test_wheel_pyodide.js
          pixi run -e wasm node tools/test_step_glb_wasm.mjs files/flat_plate_abaqus_10x10_m_wColors.stp

      - name: Stage /out (wheel + manifest + sha + step-glb + glb-diff + ifc-glb + brep-writer wasm)
        run: |
          mkdir -p out out/wasm
          cp dist/ada_cpp-*.whl out/
          # .js + .wasm + the emscripten-generated .d.ts (from --emit-tsd) for each module.
          cp build-wasm-stepglb/wasm_output/adacpp_step_glb.js out/wasm/
          cp build-wasm-stepglb/wasm_output/adacpp_step_glb.wasm out/wasm/
          cp build-wasm-stepglb/wasm_output/adacpp_step_glb.d.ts out/wasm/
          cp build-wasm-glbdiff/wasm_output/adacpp_glb_diff.js out/wasm/
          cp build-wasm-glbdiff/wasm_output/adacpp_glb_diff.wasm out/wasm/
          cp build-wasm-glbdiff/wasm_output/adacpp_glb_diff.d.ts out/wasm/
          cp build-wasm-ifcglb/wasm_output/adacpp_ifc_glb.js out/wasm/
          cp build-wasm-ifcglb/wasm_output/adacpp_ifc_glb.wasm out/wasm/
          cp build-wasm-ifcglb/wasm_output/adacpp_ifc_glb.d.ts out/wasm/
          cp build-wasm-brepwriter/wasm_output/adacpp_brep_writer.js out/wasm/
          cp build-wasm-brepwriter/wasm_output/adacpp_brep_writer.wasm out/wasm/
          cp build-wasm-brepwriter/wasm_output/adacpp_brep_writer.d.ts out/wasm/
          cp wasm-types/README.md out/wasm/
          cp wasm-types/THIRD_PARTY_LICENSES.txt out/wasm/  # GPL-3.0 notice + permissive-dep attributions
          cd out
          wheel=$(ls ada_cpp-*.whl)
          printf '{"adacpp":"%s"}\n' "$wheel" > manifest.json
          printf '%s\n' "${GITHUB_SHA}" > adacpp.sha
          echo "Staged $wheel + out/wasm/ (adacpp_step_glb + adacpp_glb_diff + adacpp_ifc_glb + adacpp_brep_writer .js/.wasm/.d.ts)"

      # Bundle the four OCC-free wasm modules (.js + .wasm + generated .d.ts + README) into a single
      # versioned zip, so a release carries both the individual files (fetch just one module) and a
      # one-download bundle. The .wasm-base image already got the same files staged above.
      - name: Bundle wasm modules for the release
        run: |
          ref="${GITHUB_REF_NAME}"
          ver="${ref#v}"                       # tag v1.2.3 -> 1.2.3
          [ "$ver" = "$ref" ] && ver="${GITHUB_SHA::7}"   # non-tag dispatch: short sha
          zip="adacpp-wasm-${ver}.zip"
          ( cd out/wasm && zip -X -r "../../${zip}" . )
          echo "ADACPP_WASM_ZIP=${zip}" >> "$GITHUB_ENV"
          echo "Bundled ${zip}:"; unzip -l "${zip}"

      # On a tag push, attach the wasm modules to the GitHub release for that tag. softprops upserts,
      # so it creates the release if the release-on-new-tag job hasn't yet, or adds assets if it has —
      # no ordering dependency between the two workflows. Mirrors build-stp2glb.yaml's release step.
      - name: Attach wasm modules to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          # Best-effort append: the license/source note is authoritatively shipped as
          # THIRD_PARTY_LICENSES.txt (in the zip + as an individual asset). This body note is a
          # convenience pointer; if the release-on-new-tag job regenerates the body after this runs,
          # the bundled file still carries the compliant notice.
          append_body: true
          body: |
            ---
            **Precompiled wasm modules** (`adacpp_*.js`/`.wasm`, `adacpp-wasm-*.zip`) are part of
            adacpp and are licensed under **GPL-3.0-or-later**. The Corresponding Source is this
            repository at the tag above (https://github.com/Krande/adacpp). They bundle third-party
            components under permissive licences (libtess2 — SGI-B-2.0; detria/meshoptimizer/
            nlohmann-json — MIT; Manifold — Apache-2.0); see `THIRD_PARTY_LICENSES.txt` in the
            bundle. Use and redistribution are subject to the GPL-3.0-or-later.
          files: |
            out/wasm/adacpp_step_glb.js
            out/wasm/adacpp_step_glb.wasm
            out/wasm/adacpp_step_glb.d.ts
            out/wasm/adacpp_ifc_glb.js
            out/wasm/adacpp_ifc_glb.wasm
            out/wasm/adacpp_ifc_glb.d.ts
            out/wasm/adacpp_brep_writer.js
            out/wasm/adacpp_brep_writer.wasm
            out/wasm/adacpp_brep_writer.d.ts
            out/wasm/adacpp_glb_diff.js
            out/wasm/adacpp_glb_diff.wasm
            out/wasm/adacpp_glb_diff.d.ts
            out/wasm/THIRD_PARTY_LICENSES.txt
            ${{ env.ADACPP_WASM_ZIP }}

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-wasm-base
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/Dockerfile.wasm-base
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
