occt:
  - 7.9.1

python:
  - 3.12

c_stdlib:
  - vs # [win]
  - sysroot # [linux]
  - macosx_deployment_target # [osx]

cdt_name:
  - cos7    # [linux]

# osx values track conda-forge's global pinning (the toolchain the deps were
# built with): clang/clangxx 19, macOS stdlib 11.0, and no MACOSX_SDK_VERSION
# pin (conda-forge derives the SDK). The old clang-17 pin emitted an LTO flag
# the runner's newer ld rejects ("-lto_library library filename must be
# 'libLTO.dylib'"); 19 matches conda-forge and fixes it. arm64-only.
c_stdlib_version:
  - "11.0"                 # [osx]
  - '2.17'                 # [linux]

c_compiler:
  - vs2022  # [win]
  - gcc     # [linux]
  - clang   # [osx]

c_compiler_version:
  - '19'    # [osx]
  - '14'    # [linux]

cxx_compiler:
  - vs2022  # [win]
  - gxx     # [linux]
  - clangxx # [osx]

cxx_compiler_version:
  - '19'    # [osx]
  - '14'    # [linux]