[workspace]
name = "ada-cpp"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[environments]
lint = { features = ["lint"], no-default-feature = true }
common = { features = ["common"], no-default-feature = true }
wasm = { features = ["wasm", "common"], no-default-feature = true }
conda = { features = ["conda"], no-default-feature = true }
test = { features = ["test", "common"], no-default-feature = true }
# Lean env for the standalone OCC-free STP2GLB CLI — only the build toolchain + CLI11 + git
# (manifold FetchContent). NO occt/cgal/gmsh/ifcopenshell/python-dev.
stp2glb = { features = ["stp2glb"], no-default-feature = true }

[feature.conda.dependencies]
rattler-build = "*"

[feature.common.dependencies]
# 3.13 to match pyodide 0.29.x's host interpreter (its xbuildenv install
# requires a 3.13 host); also adacpp's target Python under the new ABI.
python = "==3.13"
occt = { version = "==7.9.3", build = "*novtk*" }
# 0.8.5 is the first ifcopenshell built against occt 7.9.3 (0.8.3.post1 pins
# occt 7.9.0). Keep in lockstep with adapy's OCCT for the shared-ABI bridge.
ifcopenshell = ">=0.8.5"
nanobind = "==2.12.0"
cmake = "==3.30.3"
numpy = "*"
# 6.1.1 required transitively by ifcopenshell 0.8.5 (occt 7.9.3); matches adapy.
cgal-cpp = "==6.1.1"
cli11 = "*"
tinygltf = "==2.8.21" # This must be installed in target dir also if you want to compile
gmsh = "*"
ninja = "*"
cxx-compiler = "*"
# cmake FetchContent clones manifold (deps_manifold.cmake) at configure time; needs git on PATH.
# CI runners (ubuntu-latest) have system git, but minimal build images (e.g. building adacpp inside
# the adapy worker image) don't — pin it here so the build env is self-contained.
git = "*"

[feature.common.target.linux-64.dependencies]
gxx = "*"
mesa-libgl-devel-cos7-x86_64 = "*"
libxext-conda-x86_64 = "*"

[feature.test.dependencies]
pytest = "==8.3.2"
ada-py = "*"
pip = "*"

[feature.lint.dependencies]
black = "==24.4.2"
isort = "==5.13.2"
ruff = "==0.4.10"
clang-format = ">=18"

[feature.wasm.dependencies]
nodejs = "*"
ninja = "*"
cmake = "*"

# The emscripten/pyodide wasm cross-build is Linux-only (CI builds wasm on ubuntu).
# Scoping the toolchain to linux-64 keeps the `wasm` environment solvable on the
# other workspace platforms (osx-arm64 has no satisfiable emscripten 4.0.9).
[feature.wasm.target.linux-64.dependencies]
# Pyodide 0.29.x (Python 3.13, pyemscripten_2025_0 ABI) uses emscripten 4.0.9
# and native WebAssembly exception handling (-fwasm-exceptions). This is the
# latest pyodide our toolchain can build: conda-forge tops out at emscripten
# 4.0.9 (no 5.0.3 for pyodide 314/2026_0 yet) and the ifcopenshell wasm wheel
# targets the 2025_0 ABI. wasm-EH is required to fix OCCT STEP write under wasm
# (the old -fexceptions JS-trampoline model fatally traps in STEPCAFControl_Writer).
emscripten = "==4.0.9"
pyodide-build = "==0.35.0"

[feature.lint.tasks]
# Format every first-party C++ unit under src/ (no vendored code lives there;
# third_party/ is excluded by construction). git ls-files keeps it deterministic
# and cross-platform; clang-format reads the repo-root .clang-format.
lint-cpp = { cmd = "clang-format -i $(git ls-files 'src/*.cpp' 'src/*.h' 'src/*.hpp')", description = "Format first-party C++ in src/ per .clang-format" }
lint-cpp-check = { cmd = "clang-format --dry-run --Werror $(git ls-files 'src/*.cpp' 'src/*.h' 'src/*.hpp')", description = "CI gate: fail on any unformatted C++" }
lint = { cmd = "isort . && black . --config pyproject.toml && ruff check . --fix", depends-on = ["lint-cpp"], description = "Format + lint Python and C++" }

[feature.wasm.tasks]
clean = { cmd = "rm -rf build-wasm && mkdir -p build-wasm" }
wbuild = { cmd = "emcmake cmake . -B build-wasm -G Ninja -DBUILD_WASM=ON -DBUILD_PYTHON=OFF -DBUILD_TESTS=OFF -DBUILD_STP2GLB=OFF && cmake --build build-wasm", depends-on = ["clean"] }
wbuild-stepglb = { cmd = "emcmake cmake . -B build-wasm-stepglb -G Ninja -DBUILD_WASM=ON -DBUILD_STEP_GLB_WASM=ON -DBUILD_PYTHON=OFF -DBUILD_TESTS=OFF -DBUILD_STP2GLB=OFF && cmake --build build-wasm-stepglb", description = "Build the OCC-free no-pyodide STEP->GLB embind wasm module (adacpp_step_glb.js + .wasm)" }
xbuildenv-install = { cmd = "pyodide xbuildenv install 0.29.4", description = "Install the pyodide cross-build environment (Python 3.13 + emscripten 4.0.9)" }
build-occt-wasm = { cmd = "emcmake cmake --preset wasm-pyodide -DPython_INCLUDE_DIR=\"$(pyodide config get python_include_dir)\" && cmake --build build/wasm-pyodide --target occt_external", description = "Cross-build + install ONLY the OCCT-wasm toolkits → build/wasm-pyodide/_deps/occt-install (the reusable base-image input)" }
wbuild-pyodide = { cmd = "emcmake cmake --preset wasm-pyodide -DPython_INCLUDE_DIR=\"$(pyodide config get python_include_dir)\" && cmake --build build/wasm-pyodide", description = "Build the adacpp nanobind module for pyodide" }
pack-wheel-pyodide = { cmd = "rm -rf build/wasm-pyodide/install dist && cmake --install build/wasm-pyodide --prefix build/wasm-pyodide/install && python tools/build_wheel.py build/wasm-pyodide/install/wheel dist", description = "Build a pyodide-tagged wheel from the wasm-pyodide build", depends-on = ["wbuild-pyodide"] }
tools-install = { cmd = "cd tools && npm install --silent", description = "Install npm helpers (pyodide for the wheel sanity test) into tools/node_modules" }
test-wheel-pyodide = { cmd = "node tools/test_wheel_pyodide.js", description = "Smoke-test the pyodide wheel via node-pyodide", depends-on = ["pack-wheel-pyodide", "tools-install"] }
serve = { cmd = "docker run --rm -p 8088:80 -v $PIXI_PROJECT_ROOT/src/frontend/public:/usr/share/nginx/html:ro -v $PIXI_PROJECT_ROOT/src/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro -v $PIXI_PROJECT_ROOT/dist:/usr/share/nginx/html/dist:ro nginx:alpine", description = "Serve src/frontend/public on http://localhost:8088 with COOP/COEP headers (requires docker)" }

[feature.conda.tasks]
conda-build = { cmd = "rattler-build build -r conda/recipe.yaml --experimental", description = "Build the conda package" }

[feature.test.tasks]
test = { cmd = "pytest tests/py", description = "Run the tests", depends-on = ["install"] }
echo = { cmd = "echo \"$CONDA_PREFIX\"", description = "Echo Hello World" }
echo2 = { cmd = "echo \"$SP_DIR\"", description = "Echo Hello World" }

[feature.test.target.win-64.tasks]
install = { cmd = "cmake --preset pixi-test-win && cmake --build build && cmake --install build", description = "Build and install with CMake", inputs = [
    "CMakeLists.txt",
    "CMakePresets.json",
    "cmake/**/*.cmake",
    "src/**/*.cpp",
    "src/**/*.h",
    "src/**/*.hpp",
    "src/**/*.hxx",
    "src/adacpp/**/*.py",
], outputs = [
    "build/STP2GLB.exe",
    "build/_ada_cpp_ext_impl*.pyd",
] }
stp2glb = { cmd = "STP2GLB.exe", description = "Run the C++ tests" }

[feature.test.target.linux-64.tasks]
install = { cmd = "cmake --preset pixi-test-linux && cmake --build build && cmake --install build", description = "Build and install with CMake", inputs = [
    "CMakeLists.txt",
    "CMakePresets.json",
    "cmake/**/*.cmake",
    "src/**/*.cpp",
    "src/**/*.h",
    "src/**/*.hpp",
    "src/**/*.hxx",
    "src/adacpp/**/*.py",
], outputs = [
    "build/STP2GLB",
    "build/_ada_cpp_ext_impl*.so",
] }
# Build the native extension and assemble an importable adacpp package (python sources + the
# freshly built abi3 .so) under build/dist, WITHOUT installing into a conda env. Point another
# project's PYTHONPATH at build/dist to bridge a bleeding-edge adacpp (e.g. adapy's
# tests-adacpp-dev env) and measure C++ changes without a reinstall. abi3 = stable ABI, so the
# .so loads in any CPython 3.x.
build-dist = { cmd = "cmake --preset pixi-test-linux && cmake --build build && rm -rf build/dist && mkdir -p build/dist && cp -r src/adacpp build/dist/adacpp && cp build/_ada_cpp_ext_impl.abi3.so build/dist/adacpp/ && echo \"bleeding-edge adacpp -> $PIXI_PROJECT_ROOT/build/dist  (bridge via PYTHONPATH)\"", description = "Build native ext + assemble an importable adacpp at build/dist for PYTHONPATH bridging", inputs = [
    "CMakeLists.txt",
    "CMakePresets.json",
    "cmake/**/*.cmake",
    "src/**/*.cpp",
    "src/**/*.h",
    "src/**/*.hpp",
    "src/**/*.hxx",
    "src/adacpp/**/*.py",
], outputs = [
    "build/dist/adacpp/_ada_cpp_ext_impl.abi3.so",
] }
stp2glb = { cmd = "STP2GLB", description = "Run the C++ tests" }

[feature.test.target.win-64.activation.env]
STP2GLB_EXE_DIR = "%CONDA_PREFIX%/Library/bin"
SP_DIR = "%CONDA_PREFIX%/Lib/site-packages"

[feature.stp2glb.dependencies]
# Standalone OCC-free STP2GLB CLI build deps ONLY — no occt/cgal/gmsh/ifcopenshell/python-dev.
cmake = "==3.30.3"
ninja = "*"
cxx-compiler = "*"
cli11 = "*"
# cmake FetchContent clones manifold (deps_manifold.cmake) at configure time; needs git on PATH.
git = "*"

[feature.stp2glb.target.linux-64.dependencies]
gxx = "*"

[feature.stp2glb.tasks]
# Configure with BUILD_STP2GLB_STANDALONE=ON (skips OCCT/CGAL/gmsh/IFC/Python) and build only the
# STP2GLB target. TINY_INCLUDE_DIR puts $CONDA_PREFIX/include (where CLI/CLI.hpp lives) on the include
# path; CMAKE_PREFIX_PATH lets find_package(Threads) + manifold resolve against the lean env.
build-stp2glb = { cmd = "cmake -S . -B build-stp2glb -G Ninja -DBUILD_STP2GLB_STANDALONE=ON -DBUILD_PYTHON=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$CONDA_PREFIX -DTINY_INCLUDE_DIR=$CONDA_PREFIX/include && cmake --build build-stp2glb --target STP2GLB && echo \"STP2GLB -> $PIXI_PROJECT_ROOT/build-stp2glb/STP2GLB\"", description = "Build ONLY the OCC-free standalone STP2GLB CLI (no OCCT/CGAL/gmsh/IFC/Python)" }

[feature.test.target.linux-64.activation.env]
STP2GLB_EXE_DIR = "$CONDA_PREFIX/bin"
# python3.13 to match feature.common's python==3.13 pin (bumped for the pyodide
# 0.29.x xbuildenv host); keep in lockstep if that pin moves.
SP_DIR = "$CONDA_PREFIX/lib/python3.13/site-packages"
#CMAKE_PREFIX_PATH = "$CONDA_PREFIX:$CONDA_PREFIX/include:$CONDA_PREFIX/lib:$CONDA_PREFIX/bin"
