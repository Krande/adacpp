[workspace]
name = "ada-cpp"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64"]

[environments]
lint = { features = ["lint"], no-default-feature = true }
common = { features = ["common"], no-default-feature = true }
wasm = { features = ["wasm", "common"], no-default-feature = true }
conda = { features = ["conda"], no-default-feature = true }
test = { features = ["test", "common"], no-default-feature = true }

[feature.conda.dependencies]
rattler-build = "*"

[feature.common.dependencies]
python = "==3.12"
occt = { version = "==7.9.0", build = "*novtk*" }
ifcopenshell = ">=0.8.3"
nanobind = "==2.1.0"
cmake = "==3.30.3"
numpy = "*"
cgal-cpp = "==6.0.1"
cli11 = "*"
tinygltf = "==2.8.21" # This must be installed in target dir also if you want to compile
gmsh = "*"
ninja = "*"
cxx-compiler = "*"

[feature.common.target.linux-64.dependencies]
gxx = "*"
mesa-libgl-devel-cos7-x86_64 = "*"
libxext-conda-x86_64 = "*"

[feature.test.dependencies]
pytest = "==8.3.2"
ada-py = "*"
pip = "*"

[feature.lint.dependencies]
black = "==24.4.2"
isort = "==5.13.2"
ruff = "==0.4.10"

[feature.wasm.dependencies]
nodejs = "*"
ninja = "*"
emscripten = "*"

[feature.lint.tasks]
lint = "isort . && black . --config pyproject.toml && ruff check . --fix"

[feature.wasm.tasks]
clean = { cmd = "rm -rf build-wasm && mkdir -p build-wasm" }
wbuild = { cmd = "emcmake cmake . -B build-wasm -G Ninja -DBUILD_WASM=ON -DBUILD_PYTHON=OFF -DBUILD_TESTS=OFF -DBUILD_STP2GLB=OFF && cmake --build build-wasm", depends-on = ["clean"] }

[feature.conda.tasks]
conda-build = { cmd = "rattler-build build -r conda/recipe.yaml --experimental", description = "Build the conda package" }

[feature.test.tasks]
test = { cmd = "pytest tests/py", description = "Run the tests", depends-on = ["install"] }
echo = { cmd = "echo \"$CONDA_PREFIX\"", description = "Echo Hello World" }
echo2 = { cmd = "echo \"$SP_DIR\"", description = "Echo Hello World" }

[feature.test.target.win-64.tasks]
install = { cmd = "cmake --preset pixi-test-win && cmake --build build && cmake --install build", description = "Build and install with CMake", inputs = [
    "CMakeLists.txt",
    "CMakePresets.json",
    "cmake/**/*.cmake",
    "src/**/*.cpp",
    "src/**/*.h",
    "src/**/*.hpp",
    "src/**/*.hxx",
    "src/adacpp/**/*.py",
], outputs = [
    "build/STP2GLB.exe",
    "build/_ada_cpp_ext_impl*.pyd",
] }
stp2glb = { cmd = "STP2GLB.exe", description = "Run the C++ tests" }

[feature.test.target.linux-64.tasks]
install = { cmd = "cmake --preset pixi-test-linux && cmake --build build && cmake --install build", description = "Build and install with CMake", inputs = [
    "CMakeLists.txt",
    "CMakePresets.json",
    "cmake/**/*.cmake",
    "src/**/*.cpp",
    "src/**/*.h",
    "src/**/*.hpp",
    "src/**/*.hxx",
    "src/adacpp/**/*.py",
], outputs = [
    "build/STP2GLB",
    "build/_ada_cpp_ext_impl*.so",
] }
stp2glb = { cmd = "STP2GLB", description = "Run the C++ tests" }

[feature.test.target.win-64.activation.env]
STP2GLB_EXE_DIR = "%CONDA_PREFIX%/Library/bin"
SP_DIR = "%CONDA_PREFIX%/Lib/site-packages"

[feature.test.target.linux-64.activation.env]
STP2GLB_EXE_DIR = "$CONDA_PREFIX/bin"
SP_DIR = "$CONDA_PREFIX/lib/python3.12/site-packages"
#CMAKE_PREFIX_PATH = "$CONDA_PREFIX:$CONDA_PREFIX/include:$CONDA_PREFIX/lib:$CONDA_PREFIX/bin"
